apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-index
  namespace: apache
data:
  index.html: |
    <html>
      <head>
        <title>Apache Kubern8t is running</title>
        <style>
          body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
          }
          img {
            width: 1000px;
            border: 2px solid #333;
            margin-top: 20px;
          }
        </style>
      </head>
      <body>

        <h1>Apache Kubern8t is running</h1>

        <a href="https://static1.srcdn.com/wordpress/wp-content/uploads/2019/03/Dumb-Dumber-Quotes-Austria.jpg" target="_blank">
          <img src="https://static1.srcdn.com/wordpress/wp-content/uploads/2019/03/Dumb-Dumber-Quotes-Austria.jpg" alt="Apache Image">
        </a>

      </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-status-config
  namespace: apache
data:
  httpd-status.conf: |
    LoadModule status_module modules/mod_status.so
    ExtendedStatus On

    <Location /server-status>
        SetHandler server-status
        Require all granted
    </Location>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-main-override
  namespace: apache
data:
  httpd.conf: |
    # Include the original Apache config
    Include conf/original/httpd.conf

    # Include our status config
    Include conf/extra/httpd-status.conf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: apache
  labels:
    app: apache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9117"
    spec:
      containers:
        - name: apache
          image: httpd:2.4
          ports:
            - containerPort: 80
          volumeMounts:
            - name: apache-main-override
              mountPath: /usr/local/apache2/conf/httpd.conf
              subPath: httpd.conf
            - name: apache-status-config
              mountPath: /usr/local/apache2/conf/extra/httpd-status.conf
              subPath: httpd-status.conf
            - name: apache-index
              mountPath: /usr/local/apache2/htdocs/index.html
              subPath: index.html

        - name: apache-exporter
          image: bitnami/apache-exporter:latest
          args:
            - "--scrape_uri=http://localhost/server-status?auto"
          ports:
            - containerPort: 9117

      volumes:
        - name: apache-main-override
          configMap:
            name: apache-main-override
        - name: apache-status-config
          configMap:
            name: apache-status-config
        - name: apache-index
          configMap:
            name: apache-index
---
apiVersion: v1
kind: Service
metadata:
  name: apache
  namespace: apache
  labels:
    app: apache
spec:
  type: LoadBalancer
  selector:
    app: apache
  ports:
    - name: http
      port: 80
      targetPort: 80
